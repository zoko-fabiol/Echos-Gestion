name: Build Android APK (Capacitor)

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Install Capacitor CLI & Core
        # Install Capacitor CLI if not present in package.json to avoid "could not determine executable to run"
        run: npm install @capacitor/cli @capacitor/core @capacitor/android --legacy-peer-deps

      - name: Build Web Application
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

      - name: Initialize Capacitor Config if missing
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "Echo Gestion" "com.echos.gestion" --web-dir=dist
          fi

      - name: Add Android Platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Inject Android Permissions
        run: |
          node -e '
            const fs = require("fs");
            const path = "android/app/src/main/AndroidManifest.xml";
            if (fs.existsSync(path)) {
              let content = fs.readFileSync(path, "utf8");
              const permissions = [
                "<uses-permission android:name=\"android.permission.CAMERA\" />",
                "<uses-permission android:name=\"android.permission.RECORD_AUDIO\" />",
                "<uses-permission android:name=\"android.permission.MODIFY_AUDIO_SETTINGS\" />",
                "<uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" />",
                "<uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\" android:maxSdkVersion=\"28\" />",
                "<uses-permission android:name=\"android.permission.READ_MEDIA_IMAGES\" />"
              ];
              const newPermissions = permissions.filter(p => !content.includes(p.split("android.permission.")[1].split("\"")[0]));
              if (newPermissions.length > 0) {
                const insertIndex = content.indexOf("<application");
                if (insertIndex !== -1) {
                  content = content.slice(0, insertIndex) + "    " + newPermissions.join("\n    ") + "\n\n    " + content.slice(insertIndex);
                  fs.writeFileSync(path, content, "utf8");
                  console.log("Permissions injected: " + newPermissions.join(", "));
                }
              }
            }
          '

      - name: Sync Capacitor Android Project
        run: npx cap sync android

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Build Android APK (Only APK, no AAB)
        run: |
          cd android
          ./gradlew assembleDebug -x lint -x lintVitalRelease --no-daemon -PversionCode=${{ github.run_number }} -PversionName=1.0.${{ github.run_number }}

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
